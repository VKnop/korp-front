<form [formGroup]="form" (ngSubmit)="onSubmit">

  <mat-form-field>
    <mat-label>Código</mat-label>
    <input type="text" matInput formControlName="code" placeholder="Codigo">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Descrição</mat-label>
    <input type="text" matInput formControlName="description "placeholder="Descrição">
  </mat-form-field>
  <mat-form-field>
    <mat-label>Saldo</mat-label>
    <input type="text" matInput formControlName="balance" placeholder="Saldo">
  </mat-form-field>

  <button type="submit">Salvar</button>
</form>
