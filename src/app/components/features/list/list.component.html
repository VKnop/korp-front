
  <ul>
    <h3>PRODUTOS: </h3>

      <li>
        <div>
          <h3> CÓDIGO:  {{  product.code   }} </h3>

          <h3> SALDO:  {{  product.balance   }}   </h3>
        </div>
      </li>
    }
  </ul>
