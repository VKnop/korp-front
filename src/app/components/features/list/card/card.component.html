
<mat-card appearance="outlined">
      <mat-card-header>
        <mat-card-title>ID: {{productId()}}</mat-card-title>
        <mat-card-subtitle>Código: {{productCode()}}</mat-card-subtitle>
        <mat-card-subtitle>Descrição: {{productDescription()}}</mat-card-subtitle>
        <mat-card-subtitle>Quantidade: {{productBalance()}}</mat-card-subtitle>
      </mat-card-header>

        <button matButton>Learn More</button>
      </mat-card-actions>
    </mat-card>
